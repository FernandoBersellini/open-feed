spring.application.name=open-feed
spring.mvc.servlet.path=/api/v1

# Fly.io terminates TLS at its edge proxy and forwards plain HTTP internally;
# without this, request.isSecure() is false, which breaks the CSRF cookie's
# Secure attribute (CookieCsrfTokenRepository derives it from request.isSecure()).
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.zytmogaxwhipuvmztxjc
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Must be true in production (HTTPS); set COOKIE_SECURE=false only for local HTTP development.
cookie.secure=${COOKIE_SECURE}

# Lax works when frontend and backend share a registrable domain; use None (requires cookie.secure=true)
# when they're on different domains, e.g. a Vercel frontend against a Fly.io backend.
cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Frontend origin allowed by CORS (e.g. https://your-app.vercel.app); http://localhost:5173 for local dev.
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never