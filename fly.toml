# fly.toml app configuration file generated for open-feed on 2026-07-10T15:38:07-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-feed'
primary_region = 'gru'

[build]
  image = 'ghcr.io/fernandobersellini/open-feed:latest'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/v1/actuator/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
