app = "open-feed"
primary_region = "gru"

[build]
  image = "ghcr.io/fernandobersellini/open-feed:latest"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/actuator/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
